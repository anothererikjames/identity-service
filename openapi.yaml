{
  "openapi": "3.1.0",
  "info": {
    "title": "Meridian Identity API",
    "summary": "KYC/KYB identity verification and short-lived auth token issuance for the Meridian platform.",
    "description": "# Overview\n\nKYC/KYB identity verification and short-lived auth token issuance for the Meridian platform.\n\nThis API is owned by the **identity** team at Meridian Financial Services. It interoperates with **ledger-service**, **payments-service** in the broader Meridian platform. Data classification is **Restricted** and the SLA tier is **Tier-1**.\n\n# Getting started\n\nAll requests require OAuth 2.0 client credentials. Exchange your client ID and secret at `https://auth.meridianfs.example/oauth2/token`. Include the resulting access token as `Authorization: Bearer <token>` on every request.\n\n# Versioning\n\nURL path versioning (`/v1`, `/v2`). Breaking changes require a new major version with a 12-month deprecation overlap.\n\n# Support\n\n- Slack: #identity-api\n- PagerDuty: identity-oncall\n- Email: identity@meridianfs.example\n",
    "version": "1.0.0",
    "contact": {
      "name": "Meridian Identity Team",
      "email": "identity@meridianfs.example",
      "url": "https://developers.meridianfs.example/identity-service"
    },
    "license": {
      "name": "Proprietary – Meridian Financial Services",
      "url": "https://meridianfs.example/legal/api-terms"
    },
    "termsOfService": "https://meridianfs.example/legal/api-terms",
    "x-meridian-owner": "identity-platform",
    "x-meridian-slack-channel": "identity-api",
    "x-meridian-pager-duty": "https://meridianfs.pagerduty.example/identity-oncall",
    "x-meridian-data-classification": "Restricted",
    "x-meridian-pii": true,
    "x-meridian-sla-tier": "Tier-1",
    "x-meridian-regulatory-scope": [
      "SOC-2",
      "GDPR"
    ]
  },
  "servers": [
    {
      "url": "https://api.meridianfs.example/identity/v1",
      "description": "Production"
    },
    {
      "url": "https://api.sandbox.meridianfs.example/identity/v1",
      "description": "Sandbox (test data, no real money movement)"
    },
    {
      "url": "{mockServerUrl}",
      "description": "Postman mock server (filled at deploy time)",
      "variables": {
        "mockServerUrl": {
          "default": "https://placeholder.mock.pstmn.io"
        }
      }
    }
  ],
  "tags": [
    {
      "name": "Identity",
      "description": "Identity resources. The primary object this API manages."
    },
    {
      "name": "Webhooks",
      "description": "Events emitted by this service."
    }
  ],
  "security": [
    {
      "OAuth2ClientCredentials": [
        "read",
        "write"
      ]
    },
    {
      "ApiKeyAuth": []
    }
  ],
  "paths": {
    "/identities": {
      "get": {
        "summary": "List identities",
        "description": "List identities. This endpoint is part of the identity team's public surface. See the 'Getting started' section for auth requirements and error semantics.",
        "tags": [
          "Identity"
        ],
        "operationId": "listIdentities",
        "parameters": [
          {
            "$ref": "#/components/parameters/Cursor"
          },
          {
            "$ref": "#/components/parameters/Limit"
          },
          {
            "name": "status",
            "in": "query",
            "description": "Filter by lifecycle status.",
            "required": false,
            "schema": {
              "type": "string",
              "enum": [
                "pending",
                "completed",
                "failed"
              ]
            },
            "example": "completed"
          },
          {
            "name": "created_after",
            "in": "query",
            "description": "ISO-8601 timestamp. Only return resources created at or after this time.",
            "required": false,
            "schema": {
              "type": "string",
              "format": "date-time"
            },
            "example": "2026-01-01T00:00:00Z"
          }
        ],
        "responses": {
          "200": {
            "description": "Success",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/IdentityList"
                },
                "examples": {
                  "typical": {
                    "summary": "Typical response",
                    "value": {
                      "data": [
                        {
                          "id": "idt_01HXYZ99C172585D8D47EC81",
                          "created_at": "2026-04-21T14:30:00Z",
                          "updated_at": "2026-04-21T15:00:00Z",
                          "status": "completed",
                          "legal_name": "Jordan Alvarez",
                          "email": "jordan@example.com",
                          "kyc_status": "approved",
                          "country": "US"
                        }
                      ],
                      "has_more": false,
                      "next_cursor": null
                    }
                  }
                }
              }
            }
          },
          "400": {
            "$ref": "#/components/responses/BadRequest"
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
          },
          "429": {
            "$ref": "#/components/responses/RateLimited"
          }
        }
      },
