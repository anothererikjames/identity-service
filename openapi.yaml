  "webhooks": {
    "kyc.completed": {
      "post": {
        "summary": "Fired when a kyc completed event occurs",
        "description": "Meridian POSTs this event to your configured webhook URL. Verify the `X-Meridian-Signature` header using your webhook secret.",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/IdentityEvent"
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Event acknowledged"
          }
        }
      }
    },
    "identity.updated": {
      "post": {
        "summary": "Fired when a identity updated event occurs",
        "description": "Meridian POSTs this event to your configured webhook URL. Verify the `X-Meridian-Signature` header using your webhook secret.",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/IdentityEvent"
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Event acknowledged"
          }
        }
      }
    }
  },
  "components": {
    "securitySchemes": {
      "OAuth2ClientCredentials": {
        "type": "oauth2",
        "flows": {
          "clientCredentials": {
            "tokenUrl": "https://auth.meridianfs.example/oauth2/token",
            "scopes": {
              "read": "Read access",
              "write": "Write access"
            }
          }
        }
      },
      "ApiKeyAuth": {
        "type": "apiKey",
        "in": "header",
        "name": "X-API-Key",
        "description": "Server-to-server API key. Use OAuth 2.0 for interactive contexts."
      }
    },
    "parameters": {
      "Cursor": {
        "name": "cursor",
        "in": "query",
        "description": "Opaque cursor from a previous response's `next_cursor` field.",
        "required": false,
        "schema": {
          "type": "string"
        },
        "example": "eyJ0eXAiOi..."
      },
      "Limit": {
        "name": "limit",
        "in": "query",
        "description": "Maximum number of items to return. Defaults to 25, max 100.",
        "required": false,
        "schema": {
          "type": "integer",
          "minimum": 1,
          "maximum": 100,
          "default": 25
        },
        "example": 25
      },
      "IdempotencyKey": {
        "name": "Idempotency-Key",
        "in": "header",
        "required": true,
        "description": "Unique key (UUID v4 recommended) that makes this request safe to retry. Retries within 24 hours return the original response.",
        "schema": {
          "type": "string",
          "format": "uuid"
        },
        "example": "7f3e8a12-9b4c-4d5e-a8f1-2c3d4e5f6a7b"
      }
    },
    "responses": {
      "BadRequest": {
        "description": "Malformed request",
        "content": {
          "application/problem+json": {
            "schema": {
              "$ref": "#/components/schemas/Problem"
            }
          }
        }
      },
      "Unauthorized": {
        "description": "Missing or invalid credentials",
        "content": {
          "application/problem+json": {
            "schema": {
              "$ref": "#/components/schemas/Problem"
            }
          }
        }
      },
      "NotFound": {
        "description": "Resource not found",
        "content": {
          "application/problem+json": {
            "schema": {
              "$ref": "#/components/schemas/Problem"
            }
          }
        }
      },
      "Conflict": {
        "description": "Conflicts with current state",
        "content": {
          "application/problem+json": {
            "schema": {
              "$ref": "#/components/schemas/Problem"
            }
          }
        }
      },
      "Unprocessable": {
        "description": "Semantically invalid request",
        "content": {
          "application/problem+json": {
            "schema": {
              "$ref": "#/components/schemas/Problem"
            }
          }
        }
      },
      "RateLimited": {
        "description": "Too many requests",
        "headers": {
          "Retry-After": {
            "description": "Seconds to wait.",
            "schema": {
              "type": "integer"
            }
          }
        },
        "content": {
          "application/problem+json": {
            "schema": {
              "$ref": "#/components/schemas/Problem"
            }
          }
        }
      }
    },
    "schemas": {
      "Problem": {
        "description": "RFC 9457 Problem Details for HTTP APIs.",
        "type": "object",
        "required": [
          "type",
          "title",
          "status"
        ],
        "properties": {
          "type": {
            "type": "string",
            "format": "uri",
            "description": "URI identifying the problem type.",
            "example": "https://errors.meridianfs.example/validation"
          },
          "title": {
            "type": "string",
            "description": "Short human-readable summary.",
            "example": "Validation failed"
          },
          "status": {
            "type": "integer",
            "description": "HTTP status code.",
            "example": 422
          },
          "detail": {
            "type": "string",
            "description": "Human-readable explanation.",
            "example": "The `amount` field must be a positive integer."
          },
          "instance": {
            "type": "string",
            "format": "uri-reference",
            "description": "URI of this occurrence.",
            "example": "/v1/identities/idt_01HXYZDCF7DBA2662542E0AE/capture"
          },
          "correlation_id": {
            "type": "string",
            "description": "Meridian correlation ID.",
            "example": "cor_01HXYZABCDEFG"
          }
        }
      },
      "Identity": {
        "description": "A Meridian identity resource.",
        "type": "object",
        "required": [
          "id",
          "created_at",
          "status"
        ],
        "properties": {
          "id": {
            "type": "string",
            "pattern": "^idt_[A-Za-z0-9]+$",
            "description": "Unique identity identifier.",
            "example": "idt_01HXYZF7CB2E12EB8344738E"
          },
          "created_at": {
            "type": "string",
            "format": "date-time",
            "description": "Creation timestamp.",
            "example": "2026-04-21T14:30:00Z"
          },
          "updated_at": {
            "type": "string",
            "format": "date-time",
            "description": "Last update timestamp.",
            "example": "2026-04-21T15:00:00Z"
          },
          "status": {
            "type": "string",
            "enum": [
              "pending",
              "completed",
              "failed"
            ],
            "description": "Current lifecycle status.",
            "example": "completed"
          },
          "legal_name": {
            "type": "string",
            "description": "Full legal name.",
            "example": "Jordan Alvarez"
          },
          "email": {
            "type": "string",
            "format": "email",
            "description": "Contact email.",
            "example": "jordan@example.com"
          },
          "kyc_status": {
            "type": "string",
            "enum": [
              "not_started",
              "pending",
              "approved",
              "denied"
            ],
            "description": "Current KYC state.",
            "example": "approved"
          },
          "country": {
            "type": "string",
            "description": "ISO-3166-1 alpha-2 country code.",
            "example": "US"
          }
        }
      },
      "IdentityCreateRequest": {
