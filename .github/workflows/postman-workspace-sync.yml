name: Sync to Postman Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Postman CLI
        run: |
          curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh

      - name: Login
        run: |
          postman login --with-api-key ${{ secrets.POSTMAN_API_KEY_FOR_API_CATALOG }}

      - name: Push workspace
        run: |
          postman workspace push --yes
