name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund
      - run: npm run build --if-present
      - run: npm test --if-present

  postman-cli:
    runs-on: ubuntu-latest
    needs: build
    env:
      POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY_FOR_API_CATALOG }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Postman CLI
        run: |
          curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh
      - name: Login
        run: postman login --with-api-key "$POSTMAN_API_KEY"
      - name: Push workspace (source of truth)
        run: postman workspace push --yes
      - name: Run tests collection (reports events to API Catalog)
        continue-on-error: true
        run: |
          postman collection run "52238111-086157c3-d477-49c2-bcf9-10f35eacc917" \
            --environment "52238111-c866099d-797b-4488-8626-5020ac4cac1c" \
            --integration-id "$GITHUB_RUN_ID" \
            --verbose || true
      - name: Lint spec
        continue-on-error: true
        run: postman spec lint openapi.yaml || true
        working-directory: .
