name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund
      - run: npm run build --if-present
      - run: npm test --if-present

  postman-cli:
    runs-on: ubuntu-latest
    needs: build
    env:
      POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY_FOR_API_CATALOG }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Postman CLI
        run: |
          curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh
      - name: Login
        run: postman login --with-api-key "$POSTMAN_API_KEY"

      - name: Force-sync tests collection via API (PUT /collections/{uid})
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import json, os, urllib.request
          api_key = os.environ["POSTMAN_API_KEY"]
          uid = "52238111-086157c3-d477-49c2-bcf9-10f35eacc917"
          with open("postman/collections/collection.tests.v3.json") as f:
              local = json.load(f)
          # Postman /collections/{uid} PUT expects {"collection": <v2.1 body>}
          body = json.dumps({"collection": local}).encode()
          req = urllib.request.Request(
              f"https://api.postman.com/collections/{uid}",
              data=body,
              method="PUT",
              headers={"Content-Type": "application/json", "X-API-Key": api_key},
          )
          try:
              resp = urllib.request.urlopen(req, timeout=30)
              print("collection PUT:", resp.status, resp.reason)
          except urllib.error.HTTPError as e:
              print("collection PUT FAILED:", e.code, e.read()[:500].decode())
          PY

      - name: Force-sync staging environment via API (PUT /environments/{uid})
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import json, os, urllib.request
          api_key = os.environ["POSTMAN_API_KEY"]
          uid = "52238111-c866099d-797b-4488-8626-5020ac4cac1c"
          with open("postman/environments/environment.staging.json") as f:
              local = json.load(f)
          body = json.dumps({"environment": {"name": local.get("name"), "values": local.get("values", [])}}).encode()
          req = urllib.request.Request(
              f"https://api.postman.com/environments/{uid}",
              data=body,
              method="PUT",
              headers={"Content-Type": "application/json", "X-API-Key": api_key},
          )
          try:
              resp = urllib.request.urlopen(req, timeout=30)
              print("environment PUT:", resp.status, resp.reason)
          except urllib.error.HTTPError as e:
              print("environment PUT FAILED:", e.code, e.read()[:500].decode())
          PY

      - name: Push workspace (for specs/other artifacts)
        continue-on-error: true
        run: postman workspace push --yes --report-events

      - name: Run tests collection (reports events to API Catalog)
        continue-on-error: true
        run: |
          postman collection run "52238111-086157c3-d477-49c2-bcf9-10f35eacc917" \
            --environment "52238111-c866099d-797b-4488-8626-5020ac4cac1c" \
            --report-events \
            --verbose

      - name: Lint spec (Specs Lint tab)
        continue-on-error: true
        run: postman spec lint openapi.yaml --fail-severity ERROR --output JSON --report-events || true
        working-directory: .
