apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: meridian
  labels: { app: identity-service, team: identity, insights-project: svc-identity }
  annotations:
    postman.com/insights-project: "svc-identity"
spec:
  replicas: 1
  selector:
    matchLabels: { app: identity-service }
  template:
    metadata:
      labels: { app: identity-service, team: identity }
      annotations:
        postman.com/insights-project: "svc-identity"
    spec:
      containers:
      - name: identity-service
        image: identity-service:local
        imagePullPolicy: IfNotPresent
        ports: [{ containerPort: 3001 }]
        env:
        - name: PORT
          value: "3001"
        - name: FAIL_RATE
          value: "0.12"

        readinessProbe: { httpGet: { path: /readyz, port: 3001 } }
        livenessProbe:  { httpGet: { path: /healthz, port: 3001 } }
        startupProbe:   { httpGet: { path: /meta, port: 3001 }, failureThreshold: 30, periodSeconds: 2 }
